name: Go

on:
  push:
    paths-ignore:
      - packaging/**
      - openapi/**
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
    branches:
      - 'master'
  pull_request:
    paths-ignore:
      - packaging/**
      - openapi/**
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
    branches:
      - '**'

jobs:
  test:
    name: Test (Linux, shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        cache: true
        go-version-file: go.mod
    - name: Increase UDP buffer sizes
      run: |
        sudo sysctl -w net.core.rmem_max=7500000
        sudo sysctl -w net.core.wmem_max=7500000
    - name: Test shard with race detector
      run: |
        PKGS=$(go list ./... | awk 'NR % 4 == ${{ matrix.shard }}' | tr '\n' ' ')
        go test -race -failfast $PKGS

  test-compat:
    name: Build check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        cache: true
        go-version-file: go.mod
    - name: Increase UDP buffer sizes (macOS)
      if: matrix.os == 'macos-latest'
      run: sudo sysctl -w kern.ipc.maxsockbuf=6291456
    - name: Build
      run: make build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        cache: false
        go-version-file: go.mod
    - name: Commit linting
      if: github.ref != 'refs/heads/master'
      uses: wagoid/commitlint-github-action@v5
      with:
        configFile: commitlint.config.js
    - name: GolangCI-Lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        # Disable the golangci-lint cache: a restored stale cache has produced
        # phantom staticcheck findings in files unrelated to the PR diff. The
        # full lint run is fast enough that correctness is worth the trade-off.
        skip-cache: true
        version: v2.11.3
    - name: Whitespace check
      run: make check-whitespace
    - name: go mod tidy check
      uses: katexochen/go-tidy-check@v2

  coverage:
    name: Coverage Report
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        cache: true
        go-version-file: go.mod
    - name: Test with code coverage
      run: make cover=1 test-ci
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        files: ./cover.out

  trigger-beekeeper:
    name: Trigger Beekeeper
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Trigger Beekeeper
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GHA_PAT_BASIC }}
        repository: ${{ github.repository }}
        event-type: trigger-beekeeper
        client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
