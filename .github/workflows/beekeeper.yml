name: Beekeeper

on:
  repository_dispatch:
    types: [trigger-beekeeper, beekeeper]
  pull_request:
    paths-ignore:
      - packaging/**
      - openapi/**
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
    branches:
      - "**"

env:
  K3S_VERSION: "v1.31.10+k3s1"
  REPLICA: 3
  RUN_TYPE: "PR RUN"
  SETUP_CONTRACT_IMAGE: "ethersphere/bee-localchain"
  SETUP_CONTRACT_IMAGE_TAG: "0.9.4"
  BEELOCAL_BRANCH: "main"
  BEEKEEPER_BRANCH: "master"
  BEEKEEPER_METRICS_ENABLED: false
  REACHABILITY_OVERRIDE_PUBLIC: true
  BATCHFACTOR_OVERRIDE_PUBLIC: 2
  TIMEOUT: 30m
  BUCKET_NAME: swarm-beekeeper-artifacts
  AWS_ACCESS_KEY_ID: ${{ secrets.DO_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_AWS_SECRET_ACCESS_KEY }}
  AWS_EC2_METADATA_DISABLED: true
  AWS_ENDPOINT: fra1.digitaloceanspaces.com
  VERTAG: ${GITHUB_RUN_ID}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  init:
    name: Init
    runs-on: ubuntu-latest
    outputs:
      msg: ${{ steps.commit.outputs.msg }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        if: github.event.action != 'beekeeper'
        with:
          fetch-depth: 0
      - name: Checkout
        uses: actions/checkout@v5
        if: github.event.action == 'beekeeper'
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.ref }}
      - name: Get Commit Message
        id: commit
        run: |
          MSG=$(git log --format=%s -n 1 ${{github.event.after}})
          echo "msg=${MSG}" >> $GITHUB_OUTPUT

  build-bee:
    name: Build bee binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: "0"
            patched: false
          - variant: "1"
            patched: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        if: github.event.action != 'beekeeper'
        with:
          fetch-depth: 0
      - name: Checkout
        uses: actions/checkout@v5
        if: github.event.action == 'beekeeper'
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.ref }}
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod
      - name: Cache Go build cache (binary)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-binary-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-binary-
      - name: Apply patches
        if: matrix.patched
        run: |
          patch pkg/api/postage.go .github/patches/postage_api.patch
          patch pkg/retrieval/retrieval.go .github/patches/retrieval.patch
      - name: Build
        run: |
          make binary
          mv dist/bee bee-${{ matrix.variant }}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bee-${{ matrix.variant }}
          path: bee-${{ matrix.variant }}
          retention-days: 5

  install-beekeeper:
    name: Install beekeeper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        if: github.event.action != 'beekeeper'
        with:
          fetch-depth: 0
      - name: Checkout
        uses: actions/checkout@v5
        if: github.event.action == 'beekeeper'
        with:
          fetch-depth: 0
          ref: ${{ github.event.client_payload.ref }}
      - name: Install beekeeper
        run: |
          export PATH=$(pwd):$PATH
          timeout ${TIMEOUT} make beekeeper BEEKEEPER_INSTALL_DIR=$(pwd)
          beekeeper version --log-verbosity 0
          mv ~/.beekeeper.yaml .beekeeper.yaml
          mv ~/.beekeeper/local.yaml local.yaml
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: beekeeper-artifacts
          include-hidden-files: true
          path: |
            Dockerfile.goreleaser
            Makefile
            beekeeper
            local.yaml
            .beekeeper.yaml
            .github/bin/beekeeper_artifacts.sh
          retention-days: 5
  beekeeper:
    name: Integration tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [init, build-bee, install-beekeeper]
    timeout-minutes: 40
    env:
      VERTAG: ${GITHUB_RUN_ID}-${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: chain
            checks: >-
              ci-pingpong
              ci-full-connectivity
              ci-settlements
              ci-manifest
              ci-manifest-v1
              ci-postage
              ci-stake
              ci-withdraw
              ci-act
          - shard: data
            checks: >-
              ci-pingpong
              ci-full-connectivity
              ci-pss
              ci-soc
              ci-gsoc
              ci-pushsync-chunks
              ci-pushsync-light-chunks
              ci-retrieval
              ci-redundancy
              ci-feed-v1
              ci-feed
    steps:
      - name: Cache k3s
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /tmp/k3s-${{ env.K3S_VERSION }}
          key: k3s-${{ env.K3S_VERSION }}
      - name: Download beekeeper artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: beekeeper-artifacts
      - name: Download bee-1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bee-1
      - name: Unpack artifacts
        run: |
          chmod +x bee-1 beekeeper .github/bin/beekeeper_artifacts.sh
          mv .beekeeper.yaml ~/.beekeeper.yaml
          mkdir ~/.beekeeper && mv local.yaml ~/.beekeeper/local.yaml
          mv bee-1 bee
          sudo mv beekeeper /usr/local/bin/beekeeper
      - name: Prepare local cluster
        run: |
          timeout ${TIMEOUT} make beelocal OPTS='ci skip-vet' ACTION=prepare
      - name: Set kube config
        run: |
          mkdir -p ~/.kube
          cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
      - name: Set local cluster
        run: |
          timeout ${TIMEOUT} make deploylocal BEEKEEPER_CLUSTER=local-dns
      - name: Run checks (${{ matrix.shard }})
        run: |
          RETRY_CHECKS="ci-pingpong ci-full-connectivity ci-withdraw ci-act"
          run_check() {
            if [[ " ${RETRY_CHECKS} " == *" $1 "* ]]; then
              timeout ${TIMEOUT} bash -c "until beekeeper check --cluster-name local-dns --checks $1; do echo \"waiting for $1...\"; sleep .3; done"
            else
              timeout ${TIMEOUT} beekeeper check --cluster-name local-dns --checks "$1"
            fi
          }
          for check in ${{ matrix.checks }}; do
            echo "::group::${check}"
            if ! run_check "${check}"; then
              echo "FAILED=${check}" >> $GITHUB_ENV
              echo "::endgroup::"
              echo "::error::beekeeper check ${check} failed"
              exit 1
            fi
            echo "::endgroup::"
            if [ "${check}" = "ci-settlements" ]; then
              sleep 2
            fi
          done
      - name: Collect debug artifacts
        if: failure()
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          bash .github/bin/beekeeper_artifacts.sh local-dns
          curl -sSf -X POST -H "Content-Type: application/json" -d "{\"text\": \"**${RUN_TYPE}** Beekeeper Error (shard ${{ matrix.shard }})\nBranch: \`${HEAD_REF}\`\nUser: @${PR_AUTHOR}\nDebugging artifacts: [click](https://$BUCKET_NAME.$AWS_ENDPOINT/artifacts_$VERTAG.tar.gz)\nStep failed: \`${FAILED:-no-test}\`\"}" https://beehive.ethswarm.org/hooks/${{ secrets.TUNSHELL_KEY }}
          echo "Failed test: ${FAILED:-no-test}"
      - name: Create tunshell session for debug
        if: failure() && contains(needs.init.outputs.msg, '[debug]')
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          KEYS=$(curl -sSf -X POST https://eu.relay.tunshell.com/api/sessions)
          curl -sSf -X POST -H "Content-Type: application/json" -d "{\"text\": \"**Integration tests** Beekeeper Debug (shard ${{ matrix.shard }})\nBranch: \`${HEAD_REF}\`\nUser: @${PR_AUTHOR}\nDebug shell: \`sh <(curl -sSf https://lets.tunshell.com/init.sh) L $(echo $KEYS | jq -r .peer2_key) \${TUNSHELL_SECRET} eu.relay.tunshell.com\`\"}" https://beehive.ethswarm.org/hooks/${{ secrets.TUNSHELL_KEY }}
          echo "Connect to github actions node using"
          echo "sh <(curl -sSf https://lets.tunshell.com/init.sh) L $(echo $KEYS | jq -r .peer2_key) \${TUNSHELL_SECRET} eu.relay.tunshell.com"
          curl -sSf https://lets.tunshell.com/init.sh | sh /dev/stdin T $(echo $KEYS | jq -r .peer1_key) ${{ secrets.TUNSHELL_SECRET }} eu.relay.tunshell.com
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: debug-dump-${{ matrix.shard }}
          path: dump/
  retag:
    name: Retag and Trigger ArgoCD
    env:
      TIMEOUT: 10m
    needs: [beekeeper]
    runs-on: ubuntu-latest
    steps:
      - name: Download bee-0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: bee-0
      - name: Download beekeeper artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: beekeeper-artifacts
      - name: Unpack artifacts
        run: |
          chmod +x bee-0
          mv bee-0 bee
      - name: Build image
        run: |
          timeout ${TIMEOUT} make beelocal ACTION=build OPTS='ci skip-vet skip-push'
      - name: Retag Docker image and push
        if: github.ref == 'refs/heads/master' && github.event.action != 'beekeeper' && success()
        run: |
          docker tag k3d-registry.localhost:5000/ethersphere/bee:latest ethersphere/bee:latest
          docker tag k3d-registry.localhost:5000/ethersphere/bee:latest quay.io/ethersphere/bee:latest
          printf ${{ secrets.DOCKERHUB_PASSWORD }} | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          printf ${{ secrets.QUAY_PASSWORD }} | docker login --username ${{ secrets.QUAY_USERNAME }} quay.io --password-stdin
          docker push ethersphere/bee:latest
          docker push quay.io/ethersphere/bee:latest
          echo RUN_TYPE="MERGE RUN" >> $GITHUB_ENV
      - name: Trigger Bee Factory latest build
        if: github.ref == 'refs/heads/master' && github.event.action != 'beekeeper' && success()
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.GHA_PAT_BASIC }}
          repository: ethersphere/bee-factory
          event-type: build-images
          client-payload: '{"tag": "latest"}'
